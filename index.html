<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maya Vers</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#000;
color:white;
text-align:left;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:flex-start;
padding-left:8%;
position:relative;
background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url('maya-hero.png');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

h1{
font-size:7rem;
letter-spacing:6px;
font-weight:800;
text-transform:uppercase;
text-shadow:0 0 25px rgba(0,0,0,.8);
line-height:1;
}

p{
margin-top:15px;
font-size:1.1rem;
color:#d0d0d0;
letter-spacing:1px;
}

.links{
display:flex;
flex-direction:column;
gap:18px;
margin-top:35px;
}

.links a{
display:flex;
justify-content:center;
align-items:center;
width:280px;
height:60px;
text-decoration:none;
background:rgba(15,15,15,.85);
backdrop-filter:blur(10px);
color:white;
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
transition:.3s;
font-weight:600;
font-size:1rem;
}

.links a:hover{
transform:translateX(8px);
background:rgba(35,35,35,.95);
}

footer{
padding:30px;
text-align:center;
color:#777;
font-size:.9rem;
background:#000;
}

@media(max-width:768px){

.hero{
padding-left:25px;
padding-right:25px;
}

h1{
font-size:4rem;
letter-spacing:3px;
}

.links a{
width:240px;
}

}

</style>
</head>

<body>

<section class="hero">

<h1>MAYA VERS</h1>

<p>Turkish & Persian Artist</p>

<div class="links">

<a href="#">Spotify</a>

<a href="#">YouTube</a>

<a href="#">Instagram</a>

<a href="#">TikTok</a>

</div>

</section>

<footer>
© 2026 Maya Vers
</footer>

</body>
</html>
