<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maya Vers</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:flex-start;
padding-left:6%;
position:relative;

background:
linear-gradient(
90deg,
rgba(0,0,0,.82) 0%,
rgba(0,0,0,.55) 35%,
rgba(0,0,0,.25) 100%
),
url('maya-hero.png');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

h1{
font-size:5.5rem;
font-weight:800;
letter-spacing:4px;
text-transform:uppercase;
line-height:.95;
max-width:700px;
text-shadow:0 10px 30px rgba(0,0,0,.7);
}

p{
margin-top:18px;
font-size:1.05rem;
font-weight:300;
color:#d8d8d8;
letter-spacing:2px;
text-transform:uppercase;
}

.links{
display:flex;
flex-direction:column;
gap:16px;
margin-top:40px;
}

.links a{
display:flex;
justify-content:center;
align-items:center;

width:240px;
height:56px;

text-decoration:none;
color:white;

background:rgba(15,15,15,.82);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.08);
border-radius:14px;

font-size:.95rem;
font-weight:600;
letter-spacing:.5px;

transition:.3s ease;
}

.links a:hover{
transform:translateX(6px);
background:rgba(40,40,40,.95);
border:1px solid rgba(255,255,255,.18);
}

footer{
padding:30px;
text-align:center;
background:#000;
color:#777;
font-size:.9rem;
}

.music-section{
padding:100px 8%;
background:#050505;
}

.music-section h2{
font-size:3rem;
margin-bottom:15px;
letter-spacing:3px;
}

.music-subtitle{
margin-bottom:40px;
color:#999;
font-size:1rem;
}

.spotify-player{
max-width:900px;
margin:auto;
}

.spotify-player iframe{
width:100%;
border:none;
border-radius:16px;
}
  
@media(max-width:768px){

.hero{
padding-left:25px;
padding-right:25px;
background-position:65% center;
}

h1{
font-size:3.4rem;
letter-spacing:2px;
max-width:100%;
}

p{
font-size:.9rem;
letter-spacing:1px;
}

.links{
width:100%;
}

.links a{
width:100%;
max-width:260px;
height:54px;
}

}

</style>
</head>

<body>

<section class="hero">

<h1>MAYA VERS</h1>

<p>Independent Türk & Persian Artist</p>

<div class="links">

<a href="#">Spotify</a>

<a href="#">YouTube</a>

<a href="#">Instagram</a>

<a href="#">TikTok</a>

</div>

</section>
<section class="music-section">

<h2>MUSIC</h2>

<p class="music-subtitle">
Listen to the complete Maya Vers collection.
</p>

<div class="spotify-player">

<iframe
style="border-radius:16px"
src="https://open.spotify.com/embed/playlist/6K0PTRff5HDYr3NgwvJDZn?utm_source=generator&theme=0"
width="100%"
height="500"
frameBorder="0"
allowfullscreen=""
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
loading="lazy">
</iframe>

</div>

</section>
  
<footer>
© 2026 Maya Vers
</footer>

</body>
</html>
