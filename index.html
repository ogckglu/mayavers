<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya Vers</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url('maya-hero.png');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

h1{
font-size:6rem;
letter-spacing:4px;
font-weight:700;
text-shadow:0 0 25px rgba(0,0,0,.8);
}

p{
margin-top:15px;
font-size:1.1rem;
color:#bdbdbd;
}

.links{
margin-top:40px;
display:flex;
flex-direction:column;
gap:15px;
width:250px;
}

.links a{
text-decoration:none;
background:#111;
color:white;
padding:15px;
border-radius:12px;
transition:.3s;
border:1px solid #222;
}

.links a:hover{
background:#1f1f1f;
}

footer{
padding:30px;
color:#777;
font-size:.9rem;
}
</style>

</head>
<body>

<section class="hero">

<h1>MAYA VERS</h1>

<p>Official Artist Website</p>

<div class="links">

<a href="#">Spotify</a>

<a href="#">YouTube</a>

<a href="#">Instagram</a>

<a href="#">TikTok</a>

</div>

</section>

<footer>
© 2026 Maya Vers
</footer>

</body>
</html>
